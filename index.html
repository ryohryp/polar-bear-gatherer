<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polar Bear Gatherer — Mobile Optimized</title>
  <style>
    html,body{margin:0;height:100%;background:#0b1220;color:#e8efff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    #ui{position:fixed;inset:0;pointer-events:none}
    .hud{position:absolute;left:12px;top:12px;display:flex;gap:14px;align-items:flex-end}
    .meter{display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;letter-spacing:.04em}
    .bar{height:12px;width:120px;background:#1b2744;border-radius:8px;overflow:hidden;border:1px solid #2b3b6a;box-shadow:0 0 6px rgba(28,43,83,.45) inset}
    .bar>i{display:block;height:100%;background:#62b0ff}
    .tmp i{background:#ff628f}
    .hp i{background:#65f3a8}
    .fire i{background:linear-gradient(90deg,#ff9b3d,#ffd86a)}
    .bearhp{position:absolute;left:50%;transform:translateX(-50%);top:12px}
    .log{position:absolute;left:12px;bottom:12px;background:rgba(10,14,26,.7);border:1px solid #2b3b6a;border-radius:10px;padding:8px 10px;font-size:12px;max-width:70vw}
    .inv{position:absolute;right:12px;top:12px;background:rgba(10,14,26,.7);border:1px solid #2b3b6a;border-radius:10px;padding:8px 10px;font-size:12px}
    canvas{display:block;margin:0 auto;image-rendering:pixelated;touch-action:none}
    .btns{position:absolute;right:12px;bottom:12px;display:flex;gap:8px;pointer-events:auto}
    .btns button{background:#243357;color:#fff;border:1px solid #2b3b6a;border-radius:10px;padding:10px 12px;font-size:14px}
    .dpad{position:absolute;left:12px;bottom:12px;display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(3,56px);gap:8px;pointer-events:auto}
    .dpad button{background:#243357;color:#fff;border:1px solid #2b3b6a;border-radius:14px;font-size:20px;width:100%;height:100%;touch-action:none}
    .dpad span{display:block}
    @media (hover:hover) and (pointer:fine){
      .dpad{display:none}
    }
    .hint{position:absolute;left:50%;transform:translateX(-50%);bottom:12px;font-size:12px;opacity:.85}
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>
  <div id="ui">
    <div class="hud">
      <div class="meter">
        <span>HP</span>
        <div class="bar hp"><i id="hpFill" style="width:100%"></i></div>
      </div>
      <div class="meter">
        <span>温度</span>
        <div class="bar tmp"><i id="tmpFill" style="width:100%"></i></div>
      </div>
      <div class="meter">
        <span>焚き火</span>
        <div class="bar fire"><i id="fireFill" style="width:100%"></i></div>
      </div>
    </div>
    <div class="bearhp" id="bearHud" style="display:none">
      <span style="font-weight:600">BEAR</span>
      <div class="bar"><i id="bearFill" style="width:100%"></i></div>
    </div>
    <div class="inv" id="inv">木材: 0 / 10で槍クラフト [C]<br>肉: 0</div>
    <div class="log" id="log">画面ドラッグで移動。Cで槍クラフト。伐採・攻撃・焚き火への木材投入は自動。倒木は◎、木は▲。焚き火●で体温回復。</div>
    <div class="dpad" id="dpad">
      <span></span>
      <button data-dir="up">↑</button>
      <span></span>
      <button data-dir="left">←</button>
      <button data-dir="down">↓</button>
      <button data-dir="right">→</button>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="btns">
      <button id="btnCraft">槍クラフト</button>
    </div>
    <div class="hint">画面をドラッグで移動／伐採・攻撃・焚き火投入は自動</div>
  </div>

<script>
(() => {
  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d');
  const BASE_W = 960, BASE_H = 540;
  function resize(){
    const w = Math.min(window.innerWidth, BASE_W);
    const h = Math.min(window.innerHeight, BASE_H);
    const scale = Math.min(w/BASE_W, h/BASE_H);
    cvs.style.width = (BASE_W*scale|0) + 'px';
    cvs.style.height = (BASE_H*scale|0) + 'px';
  }
  addEventListener('resize', resize); resize();

  // ===== Input =====
  const keys = new Set();
  document.addEventListener('keydown', e=>{ keys.add(e.key); });
  document.addEventListener('keyup', e=>{ keys.delete(e.key); });

  // ===== UI Refs =====
  const ui = {
    hp: document.getElementById('hpFill'),
    tmp: document.getElementById('tmpFill'),
    fire: document.getElementById('fireFill'),
    bear: document.getElementById('bearFill'),
    bearHud: document.getElementById('bearHud'),
    inv: document.getElementById('inv'),
    log: document.getElementById('log')
  };
  const btnCraft = document.getElementById('btnCraft');
  const dpad = document.getElementById('dpad');
  const touchDir = { up:false, down:false, left:false, right:false };

  // ===== World / Entities =====
  const world = { w: 2000, h: 1400 };
  const cam = { x:0, y:0 };
  const player = { x:200, y:400, r:12, sp:2.0, hp:100, cold:100, hasSpear:false, atk:10, atkCD:0 };
  const fire = { x:220, y:420, r:18, heat:70, embers:0 };
  const inv = { wood:0, meat:0 };

  const trees = [];
  for(let i=0;i<45;i++) trees.push({ x: 300+ Math.random()*1600, y: 200+Math.random()*1000, hp: 30});

  const bear = { x:1600, y:900, r:18, hp:150, alive:true, aggro:false, inv:0 };
  const drops = [];

  const snow = Array.from({length:120},()=>({
    x: Math.random()*world.w,
    y: Math.random()*world.h,
    r: 1.2+Math.random()*1.4,
    drift: 0.4+Math.random()*0.6,
    speed: 0.6+Math.random()*0.8
  }));

  // ===== Utils =====
  function dist(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return Math.hypot(dx,dy); }
  function clamp(v,mi,ma){ return v<mi?mi: v>ma?ma: v; }
  function log(msg){ ui.log.textContent = msg; }

  // ===== Systems =====
  function craftSpear(){
    if (inv.wood>=10 && !player.hasSpear){
      inv.wood -= 10; player.hasSpear = true; player.atk = 22; log('槍をクラフト！攻撃力が上がった');
      bear.aggro = true; ui.bearHud.style.display='block';
    } else if (player.hasSpear){
      log('もう槍は装備済み');
    } else {
      log('木材が足りない (10必要)');
    }
  }

  function feedFire(auto=false){
    if(inv.wood<=0){ if(!auto) log('木材が足りない…'); return false; }
    const near = dist(player, fire)<50;
    if(!near){ if(!auto) log('焚き火に近づこう'); return false; }
    if(auto && fire.heat>92 && fire.embers>15) return false;
    inv.wood--;
    fire.heat = clamp(fire.heat + 18, 0, 100);
    fire.embers = 60;
    log(auto ? '焚き火に木材をくべた（自動）' : '焚き火をくべた！');
    return true;
  }

  function findNearestTree(maxDist){
    let target=null, dmin=maxDist;
    for(const t of trees){
      if(t.hp>0){
        const d = dist(t, player);
        if(d<dmin){ dmin=d; target=t; }
      }
    }
    return target;
  }

  function tryChopNearestTree(source='manual'){
    const target = findNearestTree(32);
    if(!target) return false;
    const dmg = player.hasSpear? 18:10;
    target.hp = Math.max(0, target.hp - dmg);
    if(target.hp>0){
      log(source==='auto' ? '木を伐採中…（自動）' : '木を伐採中…');
    } else {
      drops.push({x:target.x, y:target.y, type:'log'});
      log(source==='auto' ? '木を倒した！（自動）' : '木を倒した！');
    }
    return true;
  }

  function tryAttackBear(){
    if (bear.alive && dist(player,bear)<34 && player.atkCD<=0){
      const dmg = player.atk; bear.hp -= dmg; player.atkCD=18;
      ui.bear.style.width = Math.max(0,(bear.hp/150*100))+'%';
      log('クマに攻撃！ -'+dmg);
      if (bear.hp<=0){
        bear.alive=false; drops.push({x:bear.x,y:bear.y,type:'meat'});
        log('白熊を倒した！肉を入手'); ui.bearHud.style.display='none';
      }
      return true;
    }
    return false;
  }

  function pickupDrops(source='manual'){
    let picked=false;
    for(let i=drops.length-1;i>=0;i--){
      if(dist(drops[i],player)<28){
        if(drops[i].type==='log') inv.wood++;
        else inv.meat++;
        drops.splice(i,1);
        picked = true;
      }
    }
    if(picked){ log(source==='auto' ? 'アイテムを拾った（自動）' : 'アイテムを拾った'); return true; }
    return false;
  }

  // ===== Tap & Hold Move =====
  const moveTarget = { active:false, x:0, y:0 };
  function toWorldCoords(clientX, clientY){
    const rect = cvs.getBoundingClientRect();
    const sx = (clientX - rect.left) * (BASE_W / rect.width);
    const sy = (clientY - rect.top) * (BASE_H / rect.height);
    return { x: clamp(sx + cam.x, 0, world.w), y: clamp(sy + cam.y, 0, world.h) };
  }
  function startMoveTo(x,y){ moveTarget.active=true; moveTarget.x=x; moveTarget.y=y; }
  function stopMove(){ moveTarget.active=false; }

  // ===== Drag-to-move only (no long-press) =====
  const DRAG_THRESHOLD = 12; // px（画面座標）
  const dragState = { active:false, started:false, startX:0, startY:0 };

  // Touch
  cvs.addEventListener('touchstart', e => {
    if (e.touches.length === 0) return;
    e.preventDefault();
    const t = e.touches[0];
    dragState.active = true;
    dragState.started = false;
    dragState.startX = t.clientX;
    dragState.startY = t.clientY;
  }, { passive:false });

  cvs.addEventListener('touchmove', e => {
    if (!dragState.active) return;
    e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - dragState.startX;
    const dy = t.clientY - dragState.startY;
    const moved = Math.hypot(dx, dy);
    if (!dragState.started && moved > DRAG_THRESHOLD) dragState.started = true;
    if (dragState.started) {
      const p = toWorldCoords(t.clientX, t.clientY);
      startMoveTo(p.x, p.y);
    }
  }, { passive:false });

  cvs.addEventListener('touchend', () => { dragState.active=false; dragState.started=false; stopMove(); }, { passive:true });
  cvs.addEventListener('touchcancel', () => { dragState.active=false; dragState.started=false; stopMove(); }, { passive:true });

  // Mouse
  cvs.addEventListener('mousedown', e => {
    dragState.active = true;
    dragState.started = false;
    dragState.startX = e.clientX;
    dragState.startY = e.clientY;
  });
  cvs.addEventListener('mousemove', e => {
    if (!dragState.active) return;
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    const moved = Math.hypot(dx, dy);
    if (!dragState.started && moved > DRAG_THRESHOLD) dragState.started = true;
    if (dragState.started) {
      const p = toWorldCoords(e.clientX, e.clientY);
      startMoveTo(p.x, p.y);
    }
  });
  document.addEventListener('mouseup', () => { dragState.active=false; dragState.started=false; stopMove(); });

  // D-Pad（任意：PCや外付けコントローラ用に残す）
  if(dpad){
    const applyDir = (dir, value)=>{
      if(dir==='up') touchDir.up = value;
      else if(dir==='down') touchDir.down = value;
      else if(dir==='left') touchDir.left = value;
      else if(dir==='right') touchDir.right = value;
    };
    dpad.querySelectorAll('button').forEach(btn=>{
      const dir = btn.dataset.dir; if(!dir) return;
      const start = e=>{ e.preventDefault(); applyDir(dir, true); };
      const end = ()=>applyDir(dir, false);
      btn.addEventListener('touchstart', start, {passive:false});
      btn.addEventListener('touchend', end);
      btn.addEventListener('touchcancel', end);
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', end);
      btn.addEventListener('mouseleave', end);
    });
    document.addEventListener('mouseup', ()=>{ touchDir.up=touchDir.down=touchDir.left=touchDir.right=false; });
    document.addEventListener('touchend', ()=>{ touchDir.up=touchDir.down=touchDir.left=touchDir.right=false; });
    document.addEventListener('touchcancel', ()=>{ touchDir.up=touchDir.down=touchDir.left=touchDir.right=false; });
  }

  // ===== Main Update =====
  let autoChopCooldown = 0;
  let autoFeedCooldown = 0;

  function update(){
    // 移動
    const up = keys.has('w')||keys.has('ArrowUp')||touchDir.up;
    const dn = keys.has('s')||keys.has('ArrowDown')||touchDir.down;
    const lt = keys.has('a')||keys.has('ArrowLeft')||touchDir.left;
    const rt = keys.has('d')||keys.has('ArrowRight')||touchDir.right;
    const sp = player.sp;

    let vx=0, vy=0;
    if (moveTarget.active){
      const dx = moveTarget.x - player.x;
      const dy = moveTarget.y - player.y;
      const d = Math.hypot(dx, dy);
      if (d > 1){ vx = dx/d*sp; vy = dy/d*sp; } else { stopMove(); }
    } else {
      if(up) vy -= sp;
      if(dn) vy += sp;
      if(lt) vx -= sp;
      if(rt) vx += sp;
    }
    player.x = clamp(player.x + vx, 0, world.w);
    player.y = clamp(player.y + vy, 0, world.h);

    if(autoChopCooldown>0) autoChopCooldown--;
    if(autoFeedCooldown>0) autoFeedCooldown--;

    // 温度/HP/焚き火
    const distToFire = dist(player, fire);
    const nearFire = distToFire<60 && fire.heat>0;
    player.cold += nearFire? 0.25 + fire.heat*0.004 : -(0.04 + (100-fire.heat)*0.0006);
    player.cold = clamp(player.cold, 0, 100);
    if(nearFire && player.hp<100) player.hp += 0.06;
    player.hp = clamp(player.hp, 0, 100);

    fire.heat = clamp(fire.heat - 0.018, 0, 100);
    if(fire.embers>0) fire.embers--;

    // 自動攻撃（近接）
    if(bear.alive && player.atkCD<=0 && dist(player,bear)<34){
      tryAttackBear();
    }

    // 自動伐採（クールダウンを軽く再導入）
    if(autoChopCooldown<=0){
      if(tryChopNearestTree('auto')) autoChopCooldown = player.hasSpear? 18 : 24;
    }

    // 自動拾得
    pickupDrops('auto');

    // 自動くべ
    const needsFuel = fire.heat<70 || fire.embers<10;
    if(autoFeedCooldown<=0 && distToFire<50 && needsFuel){
      if(feedFire(true)) autoFeedCooldown = 120;
    }

    // Bear AI
    if(bear.alive && bear.aggro){
      const dx = player.x - bear.x; const dy = player.y - bear.y; const d = Math.hypot(dx,dy);
      const speed = 1.1 + (player.hasSpear? 0.2:0);
      if(d>1){ bear.x += dx/d*speed; bear.y += dy/d*speed; }
      if(d<26 && bear.inv<=0){ player.hp -= 8; bear.inv=35; log('クマの攻撃！-8'); }
      if(bear.inv>0) bear.inv--;
    }

    if(player.atkCD>0) player.atkCD--;
    if(player.cold<=0){ player.hp -= 0.15; }
    if(player.hp<=0){ player.hp=0; log('力尽きた… Rで再開'); }

    // UI
    ui.hp.style.width = player.hp+'%';
    ui.tmp.style.width = player.cold+'%';
    ui.fire.style.width = fire.heat+'%';
    ui.inv.innerHTML = `木材: ${inv.wood} / 10で槍クラフト [C]<br>肉: ${inv.meat}<br>焚き火は自動で木材補充`;

    // Keys
    if(keys.has('c')||keys.has('C')){ keys.delete('c'); keys.delete('C'); craftSpear(); }
    if(keys.has('r')||keys.has('R')){ if(player.hp<=0) restart(); }
  }

  // ===== Render =====
  function draw(){
    ctx.clearRect(0,0,BASE_W,BASE_H);
    // camera
    cam.x = clamp(player.x - BASE_W/2, 0, world.w-BASE_W);
    cam.y = clamp(player.y - BASE_H/2, 0, world.h-BASE_H);

    // bg
    ctx.fillStyle = '#0e1730';
    ctx.fillRect(0,0,BASE_W,BASE_H);

    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    // tiles
    for(let x=0;x<world.w;x+=80){
      for(let y=0;y<world.h;y+=80){
        ctx.fillStyle = '#132149';
        ctx.fillRect(x,y,78,78);
      }
    }

    // snow backdrop
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ffffff';
    for(const flake of snow){
      const sx = flake.x - cam.x;
      const sy = flake.y - cam.y;
      if(sx<-20 || sx>BASE_W+20 || sy<-20 || sy>BASE_H+20) continue;
      ctx.beginPath(); ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // fire
    ctx.fillStyle = fire.heat>0? '#ff9b3d':'#3a3a4a';
    ctx.beginPath(); ctx.arc(fire.x, fire.y, fire.r, 0, Math.PI*2); ctx.fill();
    if(fire.heat>0){
      const pulse = 1 + Math.sin(performance.now()/160)*0.08;
      ctx.fillStyle = '#ffc97a';
      ctx.beginPath(); ctx.arc(fire.x, fire.y, fire.r*0.55*pulse, 0, Math.PI*2); ctx.fill();
      if(fire.embers>0){
        ctx.strokeStyle = 'rgba(255,219,120,0.75)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(fire.x, fire.y, fire.r+fire.embers*0.03, 0, Math.PI*2); ctx.stroke();
      }
    }

    // trees
    for(const t of trees){
      if(t.hp<=0){
        ctx.fillStyle = '#7b5b42';
        ctx.beginPath(); ctx.arc(t.x, t.y, 8, 0, Math.PI*2); ctx.fill(); // stump
      } else {
        ctx.fillStyle = '#2e8b57';
        ctx.beginPath(); ctx.moveTo(t.x, t.y-12); ctx.lineTo(t.x-10, t.y+10); ctx.lineTo(t.x+10, t.y+10); ctx.closePath(); ctx.fill();
      }
    }

    // drops
    for(const d of drops){
      ctx.fillStyle = d.type==='log'? '#c48b54':'#ff647a';
      ctx.beginPath(); ctx.arc(d.x,d.y,6,0,Math.PI*2); ctx.fill();
    }

    // bear
    if(bear.alive){
      ctx.fillStyle = '#e6f1ff';
      ctx.beginPath(); ctx.arc(bear.x, bear.y, bear.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#c6d4ff';
      ctx.beginPath(); ctx.arc(bear.x+6, bear.y-4, 4, 0, Math.PI*2); ctx.fill();
    }

    // player
    ctx.fillStyle = player.hasSpear? '#8fe6ff':'#62b0ff';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1c2b53';
    ctx.beginPath(); ctx.arc(player.x-3, player.y-4, 2, 0, Math.PI*2); ctx.fill();
    if(player.hasSpear){
      ctx.strokeStyle = '#c9f7ff'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(player.x+10, player.y-2); ctx.lineTo(player.x+28, player.y-4); ctx.stroke();
    }

    ctx.restore();

    // goal text
    if(!player.hasSpear){
      drawText('木材10で槍クラフト → 白熊撃破で肉確保', BASE_W/2, 60);
      drawText('焚き火の炎は自動で木材補充される', BASE_W/2, 84);
    } else if(bear.alive){
      drawText('白熊を倒そう！', BASE_W/2, 60);
      drawText('焚き火で温まりつつ戦うと安全', BASE_W/2, 84);
    } else {
      drawText('クリア！ 焚き火で温まろう', BASE_W/2, 60);
    }
  }

  function drawText(t, x, y){
    ctx.save();
    ctx.font = '16px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.fillText(t, x, y);
    ctx.restore();
  }

  function restart(){
    player.x=200; player.y=400; player.hp=100; player.cold=100; player.hasSpear=false; player.atk=10; player.atkCD=0;
    inv.wood=0; inv.meat=0; ui.bearHud.style.display='none';
    trees.forEach(t=>t.hp = Math.random()<0.5? 30:20);
    bear.x=1600; bear.y=900; bear.hp=150; bear.alive=true; bear.aggro=false; bear.inv=0;
    drops.length=0;
    fire.heat = 70; fire.embers = 0;
    log('再開！');
  }

  // UI buttons
  btnCraft.addEventListener('click', craftSpear);
  btnCraft.addEventListener('touchstart', e=>{ e.preventDefault(); craftSpear(); }, {passive:false});

  // ===== Game Loop =====
  function loop(){
    update();

    // snow update
    for(const flake of snow){
      flake.y += flake.speed;
      flake.x += Math.sin(flake.y*0.04)*flake.drift;
      if(flake.y>world.h){ flake.y = -20; flake.x = Math.random()*world.w; }
      if(flake.x<0) flake.x += world.w; else if(flake.x>world.w) flake.x -= world.w;
    }

    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
